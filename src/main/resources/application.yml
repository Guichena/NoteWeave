server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/noteweave?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:noteweave}
    password: ${DB_PASSWORD:noteweave}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        spring.json.trusted.packages: "*"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

noteweave:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:noteweave}
      secret-key: ${MINIO_SECRET_KEY:noteweave-minio-secret}
      bucket: ${MINIO_BUCKET:noteweave-dev}
      test-bucket: ${MINIO_TEST_BUCKET:noteweave-test}
    paths:
      local-test-root: ${NOTEWEAVE_TEST_ROOT:target/noteweave-test}
      dev-object-prefix: ${NOTEWEAVE_DEV_OBJECT_PREFIX:dev}
      test-object-prefix: ${NOTEWEAVE_TEST_OBJECT_PREFIX:test}
      test-run-id: ${NOTEWEAVE_TEST_RUN_ID:}
  upload:
    bitmap-ttl-hours: ${NOTEWEAVE_UPLOAD_BITMAP_TTL_HOURS:24}
    cleanup:
      enabled: ${NOTEWEAVE_UPLOAD_CLEANUP_ENABLED:true}
      fixed-delay-ms: ${NOTEWEAVE_UPLOAD_CLEANUP_FIXED_DELAY_MS:600000}
  kafka:
    topics:
      task: ${NOTEWEAVE_KAFKA_TOPIC_TASK:noteweave.task}
      document-process: ${NOTEWEAVE_KAFKA_TOPIC_DOCUMENT:noteweave.document}
    consumer-groups:
      task: ${NOTEWEAVE_KAFKA_GROUP_TASK:noteweave-task-worker}
  task:
    dispatcher:
      enabled: ${NOTEWEAVE_TASK_DISPATCHER_ENABLED:true}
      fixed-delay-ms: ${NOTEWEAVE_TASK_DISPATCHER_FIXED_DELAY_MS:5000}

jwt:
  secret-key: ${JWT_SECRET_KEY:change-me-in-dev-change-me-in-dev}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-N/A}]"
  level:
    org.springframework.security: INFO
    com.noteweave: INFO
