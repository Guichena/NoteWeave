spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        spring.json.trusted.packages: "*"
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

jwt:
  secret-key: test-secret-key-test-secret-key-test-secret-key
  access-token-expiration-seconds: 900
  refresh-token-expiration-seconds: 1209600

noteweave:
  storage:
    minio:
      bucket: noteweave-test
      test-bucket: noteweave-test
    paths:
      local-test-root: target/noteweave-test
      test-object-prefix: test
      test-run-id: local
  upload:
    bitmap-ttl-hours: 24
    cleanup:
      enabled: false
      fixed-delay-ms: 600000
  kafka:
    topics:
      task: test.noteweave.task.local
      document-process: test.noteweave.document.local
    consumer-groups:
      task: test-noteweave-task-worker-local
      document-process: test-noteweave-document-worker-local
  task:
    dispatcher:
      enabled: false
      fixed-delay-ms: 5000
  document:
    parsing:
      chunk-size: 80
      chunk-overlap: 20
      max-text-length: 2000000
  elasticsearch:
    uris: http://localhost:9200
    index-prefix: noteweave-test-local-
  rag:
    retrieval:
      top-k: 8
      per-document-limit: 3
      context-max-chars: 12000
      max-merged-chars: 2400
    prompt:
      no-result-text: 暂无相关信息
  llm:
    stub:
      enabled: true
      provider: stub
      model: noteweave-stub-chat
    api:
      base-url: http://localhost:18080/v1
      api-key:
      model: deepseek-chat
      temperature: 0.3
      max-tokens: 2000
      timeout-seconds: 60
