spring:
  datasource:
    url: jdbc:h2:mem:noteweave;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret-key: test-secret-key-test-secret-key-test-secret-key
  access-token-expiration-seconds: 900
  refresh-token-expiration-seconds: 1209600
