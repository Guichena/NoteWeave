spring:
  datasource:
    url: jdbc:h2:mem:noteweave;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret-key: test-secret-key-test-secret-key-test-secret-key
  expiration-seconds: 86400
